name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y shfmt
      - run: ./tests/run lint

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: tests/.deps/bats-core
          key: bats-core-v1.13.0
      - run: ./tests/run test

  test-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          path: tests/.deps/bats-core
          key: bats-core-v1.13.0
      - run: sudo apt-get update && sudo apt-get install -y expect
      - run: ./tests/run test
